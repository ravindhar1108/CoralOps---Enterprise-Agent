spring.application.name=demo

# Spring Boot Config for loading local .env file
spring.config.import=optional:file:.env[.properties]

# Azure AI Foundry / OpenAI Configuration
# spring.ai.openai.base-url=https://ravindharg1108-9370-resource.services.ai.azure.com/openai
# spring.ai.openai.api-key=${AZURE_OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=Phi-4-reasoning

# Groq Configuration (Using OpenAI-compatible endpoint):
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Spring AI MCP Client Configuration
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.toolcallback.enabled=true

# Coral MCP Server Connection (DISABLED AUTO-CONFIG: using CustomMcpConfig.java instead)
#spring.ai.mcp.client.stdio.connections.coral.command=coral
#spring.ai.mcp.client.stdio.connections.coral.args[0]=mcp-stdio
#spring.ai.mcp.client.stdio.connections.coral.env.SONARQUBE_API_KEY=${SONARQUBE_API_KEY}
#spring.ai.mcp.client.stdio.connections.coral.env.GITHUB_TOKEN=${GITHUB_PAT}
#spring.ai.mcp.client.stdio.connections.coral.env.LINEAR_API_KEY=${LINEAR_API_KEY}
#spring.ai.mcp.client.stdio.connections.coral.env.SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}

# ----------------------------------------
# Debug Logging (See exactly what the LLM does)
# ----------------------------------------
logging.level.org.springframework.ai=DEBUG

sentry.dsn=${SENTRY_DSN}
# Add data like request headers and IP for users,
# see https://docs.sentry.io/platforms/java/guides/spring-boot/data-management/data-collected/ for more info
sentry.send-default-pii=true

server.port=${PORT:8080}
